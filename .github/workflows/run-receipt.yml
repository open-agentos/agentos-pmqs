# =============================================================================
# Run Receipt — reusable workflow that posts a machine-parseable run summary
# Callers: add `uses: ./.github/workflows/run-receipt.yml` with `job_status`
# plus the agent identity and usage outputs from the calling job.
# The calling job MUST grant `permissions: issues: write` — a called workflow
# cannot exceed its caller's token permissions.
# =============================================================================

name: Run Receipt

on:
  workflow_call:
    inputs:
      job_status:
        description: 'Final status of the calling job (success, failure, cancelled)'
        type: string
        required: true
      agent_role:
        description: 'Agent role that ran (builder, reviewer, ...)'
        type: string
        required: false
        default: ''
      issue_number:
        description: 'Issue the run was working on'
        type: string
        required: false
        default: ''
      duration_s:
        description: 'Agent runtime in seconds (from the runner result)'
        type: string
        required: false
        default: ''
      tokens_in:
        description: 'Input tokens consumed by the agent run'
        type: string
        required: false
        default: ''
      tokens_out:
        description: 'Output tokens produced by the agent run'
        type: string
        required: false
        default: ''
      cache_write:
        description: 'Cache-creation input tokens'
        type: string
        required: false
        default: ''
      cache_read:
        description: 'Cache-read input tokens'
        type: string
        required: false
        default: ''
      cost_usd:
        description: 'Total run cost in USD as reported by the runner'
        type: string
        required: false
        default: ''
      turns:
        description: 'Number of agent turns used'
        type: string
        required: false
        default: ''

jobs:

  # ---------------------------------------------------------------------------
  # post-receipt — posts the receipt comment on the issue the agent worked on.
  # Identity comes from caller inputs, not branch parsing: label-triggered
  # orchestrate runs execute on the default branch, so branch names carry no
  # agent metadata.
  # ---------------------------------------------------------------------------
  post-receipt:
    name: Post run receipt comment
    runs-on: ubuntu-latest
    if: inputs.issue_number != '' && inputs.agent_role != '' && inputs.agent_role != 'skip'
    permissions:
      issues: write

    steps:
      - name: Post receipt comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS="${{ inputs.job_status }}"
          RUN_ID="${{ github.run_id }}"
          ROLE="${{ inputs.agent_role }}"
          DURATION="${{ inputs.duration_s }}"
          [ -n "$DURATION" ] || DURATION="unknown"

          USAGE_LINE=""
          if [ -n "${{ inputs.tokens_in }}" ]; then
            USAGE_LINE="Tokens: \`${{ inputs.tokens_in }} in / ${{ inputs.tokens_out }} out\` | Cache: \`${{ inputs.cache_write }} w / ${{ inputs.cache_read }} r\` | Cost: \`\$${{ inputs.cost_usd }}\` | Turns: \`${{ inputs.turns }}\`"
          fi

          BODY="<!-- agentOS:run-receipt -->
          **Run Receipt** | Role: \`${ROLE}\` | Status: \`${STATUS}\` | Duration: \`${DURATION}s\`
          ${USAGE_LINE}
          Run ID: \`${RUN_ID}\`
          <!-- /agentOS:run-receipt -->"

          gh issue comment "${{ inputs.issue_number }}" \
            --body "$BODY" \
            --repo "${{ github.repository }}"
