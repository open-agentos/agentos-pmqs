# agentOS.yaml — GitHub AgentOS Core Specification
# Importable configuration for label-driven multi-agent orchestration on GitHub.
# Human-readable, git-diffable, versioned.
#
# Import this file into your project with:
#   agentOS init --from github:open-agentos/agentos@v1.2.3
#
# Then provision your repository with:
#   agentOS apply --repo owner/my-repo

specVersion: "1.2.3"
specId: "github-agentOS"

metadata:
  name: "GitHub AgentOS"
  description: "Label-driven multi-agent orchestration on GitHub"
  homepage: "https://github.com/open-agentos/agentos"
  license: "MIT"
  authors:
    - name: "Open AgentOS Contributors"
      url: "https://github.com/open-agentos"

# ============================================================
# AGENTS
# Each entry defines a role, its GitHub App identity, and its
# permission scope. create_app: true means the bootstrap wizard
# will register a dedicated GitHub App for this role.
# reuse_app: builder means the role shares the builder App.
# ============================================================
agents:
  - id: builder
    description: >
      Implements features and fixes. Opens pull requests. The only role with
      write access to repository contents. Handles initial implementation
      (status:todo) and retries after review (status:changes-requested).
    create_app: true
    permissions:
      contents: write
      issues: write
      pull_requests: write
      metadata: read
      workflows: write        # Required to push .github/workflows/ changes
    triggers:
      - status:todo
      - status:changes-requested
    branch_prefix: "agent/builder/"

  - id: reviewer
    description: >
      Reviews pull requests and code quality. Approves or requests changes.
      Intentionally constrained: no write access to repository contents.
      A reviewer that can push code can circumvent its own review.
    create_app: true
    permissions:
      issues: write
      pull_requests: write
      metadata: read
      checks: write
    triggers:
      - status:in-review
    branch_prefix: "agent/reviewer/"

  - id: watcher
    description: >
      Minimal-footprint role for settlement, issue creation, and monitoring.
      Plugins that add scheduled behaviours (e.g. daily digests) run as watcher.
    create_app: true
    permissions:
      issues: write
      pull_requests: write      # Intake closing-link writes (SPEC.md §12.4.1).
                                # Without this, stub dedupe and merge-settlement
                                # silently fail — see v1.2.2 release notes.
      metadata: read
    triggers: []              # Invoked by schedule or settlement, not labels
    branch_prefix: "agent/watcher/"

  - id: board
    description: >
      Projects v2 mutations only. Updates board fields after each run and on
      PR settlement. No repository write access.
    create_app: true
    permissions:
      organization_projects: write   # NOTE: NOT repository_projects
      metadata: read
    triggers: []              # Invoked by settlement workflow only
    branch_prefix: ""         # board role does not open branches

  # ---- Optional roles (uncomment to enable) ----

  # - id: docs
  #   description: >
  #     Updates documentation and changelog after approved PRs and when
  #     follow-on:docs-needed is applied. Reuses builder App credentials.
  #   create_app: false
  #   reuse_app: builder
  #   triggers:
  #     - status:approved
  #   branch_prefix: "agent/docs/"

  - id: planner
    description: >
      Expands a thin issue into a concrete, file-level plan written between
      <!-- AGENTOS:PLAN:BEGIN/END --> markers in the issue body. Runs on
      status:plan. Needs issues:write only — no code access.
      NOTE: If provisioning a fifth GitHub App is too heavyweight, run this role
      under an issues-scoped builder token and split it out later (see TODO below).
      TODO: provision a dedicated Planner GitHub App with issues:write only.
    create_app: false
    reuse_app: builder          # Temporary — replace with create_app: true once dedicated App is provisioned
    permissions:
      issues: write             # Sufficient: reads issue body/comments, writes body and comment
    triggers:
      - status:plan
    branch_prefix: ""           # Planner does not open branches

  - id: janitor
    description: >
      Deterministic cleanup tooling run against wild branches during
      status:intake (SPEC.md §12.5). Autofix janitors push tool-generated,
      semantics-preserving commits under this App identity; report janitors
      emit check runs and findings. Deliberately narrow permission set:
      NO issues:write, NO workflows:write, no review or approval capability
      (SPEC.md §12.9.2).
    create_app: true
    permissions:
      contents: write           # Push janitor commits to wild PR branches
      checks: write             # Publish report-tier findings as check runs
      pull_requests: write      # Comment on PRs (findings summaries)
      metadata: read
    triggers: []                # Invoked by the intake workflow, not labels
    branch_prefix: ""           # Janitors push to the author's branch, never their own

  - id: archaeologist
    description: >
      Reconstructs intent from unplanned ("wild") pull requests (SPEC.md §12.6).
      A pure function: diff and context in, one schema-validated JSON payload
      out. Holds NO GitHub token and has NO App identity — the orchestrator
      performs every side effect on its behalf. The runner MUST NOT grant it
      shell execution, network access, or any tool with side effects.
    # DELIBERATE EXCEPTION — do NOT create a GitHub App for this role.
    # GitHub permissions are not row-level: any issues:write token can edit
    # every issue in the repo. The archaeologist consumes untrusted input;
    # mediated writes via the watcher token are its containment (SPEC.md §13).
    # Provisioning an App for it silently defeats that design.
    create_app: false           # Intentionally no App: mediated writes only
    triggers:
      - status:intake           # Dispatched after janitors settle and tripwires pass
    branch_prefix: ""           # Archaeologist does not open branches

# ============================================================
# RUNTIME
# The runner command is the CLI tool that executes agents.
# Any command that satisfies the runtime interface (SPEC.md §5)
# can be used: hermes, claude, codex, or a custom script.
#
# Required env vars injected by the orchestrator:
#   AGENT_ROLE, ISSUE_NUMBER, GITHUB_TOKEN,
#   GITHUB_REPOSITORY, GITHUB_RUN_ID
#
# Optional env vars (set if present in config):
#   LLM_PROVIDER, LLM_MODEL, LLM_API_KEY,
#   AGENT_MAX_TURNS, OPS_REPO, OPS_REPO_TOKEN
# ============================================================
runtime:
  runner: "cat agents/$AGENT_ROLE/AGENT.md | claude -p --dangerously-skip-permissions --output-format json --max-turns $AGENT_MAX_TURNS"  # Replace with your agent runner
  max_turns_default: 40
  branch_convention: "agent/{role}/{issue_number}-{slug}"
  receipt_comment_marker: "<!-- agentOS:run-receipt -->"

# ============================================================
# GOVERNANCE
# Controls the planning stage and approval gate that sit in
# front of the builder. All fields have happy-path defaults;
# zero config is needed to run with planning required.
# ============================================================
governance:
  # required  — status:plan must be applied and a plan approved before builder runs.
  # optional  — issues may go straight to status:todo and build without a plan.
  # off       — planning disabled entirely; legacy builder behaviour.
  planning: required

  # Collaborator permission levels whose /approve-plan comments authorise a build.
  # GitHub permission levels: admin, maintain, write, triage, read.
  approvers: [admin]

  # Slash-command the orchestrator listens for to approve a plan.
  approve_command: "/approve-plan"

  # Slash-command that sends an issue back to status:plan for replanning.
  changes_command: "/request-changes"

  # Marker pair used to delimit the plan block in the issue body.
  # The planner MUST replace content between these markers on each run (never append).
  plan_begin_marker: "<!-- AGENTOS:PLAN:BEGIN -->"
  plan_end_marker: "<!-- AGENTOS:PLAN:END -->"

  # Provenance-weighted governance for wild work (SPEC.md §12.9).
  # Issues carrying source:wild get stricter downstream defaults; each
  # field is overridable only explicitly.
  wild:
    auto_merge: false                       # Regardless of repo default
    final_approval: human                   # A human merges, always
    max_review_cycles: 2                    # Tighter than the planned default of 3
    changes_requested_routes_to: builder    # builder | author

# ============================================================
# INTAKE
# The unplanned ("wild") PR pipeline: classification, stub
# issues, janitors, the archaeologist, and /approve-intent.
# See SPEC.md §12. Shipped enabled with every janitor in
# report mode — behaviourally invisible (no pushes) while
# still exercising classification and the human gate.
# ============================================================
intake:
  enabled: true

  # PR authors ignored by intake entirely (bot flood guard, SPEC.md §12.2.2).
  exclude_actors: ["dependabot[bot]", "renovate[bot]"]

  # Trusted-author gate (operator cost control — layered in front of the
  # normative §12.2.2 rule). Because intake runs the LLM-backed archaeologist
  # on every wild PR, a PR is only classified wild when its author is trusted:
  # either their repo collaborator permission is at/above min_permission, or
  # their login appears in allow_actors. Untrusted authors' PRs are left
  # untouched — no stub, no janitors, no archaeology, zero LLM spend — for a
  # maintainer to triage by hand (apply status:todo to opt one in).
  # Tiers, low→high: none < read < triage < write < maintain < admin.
  # Fails CLOSED: an unset/invalid min_permission or an unresolvable author is
  # treated as untrusted, so a misconfig can never open the spend floodgate.
  # Override at runtime via repo Actions variables INTAKE_MIN_PERMISSION and
  # INTAKE_ALLOW_ACTORS (comma-separated) without editing the workflow.
  min_permission: write
  allow_actors: []

  # Human PRs with a closing-linked issue are planned work done manually.
  # ignore                — intake does not touch them (default)
  # janitors-report-only  — run report-tier janitors (no pushes, no archaeology)
  linked_prs: ignore

  # Quiet period (seconds, no author pushes) before autofix janitors and
  # the archaeologist run. Report-mode checks may run immediately.
  settle_seconds: 300

  # Max full janitor-sequence passes before declaring non-convergence:
  # revert all janitor commits, demote to report mode, file a config bug.
  convergence_passes: 2

  # auto — run the repo test suite before/after autofix as a behavioural
  #        oracle (pass→fail reverts and demotes). off — skip.
  test_oracle: auto

  # Above this diff size, skip interpretation: facts-only reconstruction,
  # confidence pinned to low.
  max_diff_lines: 6000

  # Max archaeologist runs per stub; beyond it, facts-only mode.
  max_recon_runs: 5

  # Archaeologist model override; null = orchestrator default.
  model: null

  # May the PR author approve their own intent (if they hold the authoriser
  # role)? Set false on mixed teams to require a second person.
  # `agentOS init` sets this from repo collaborator count.
  approve_intent_self: true

  # Deterministic path rules evaluated against the diff's file list before
  # any agent runs. Any match routes the stub to status:blocked (SPEC.md §12.6.2).
  tripwire_paths:
    - ".github/workflows/**"
    - ".github/actions/**"
    - "agentOS.yaml"
    - ".agentOS/**"

  # Janitor sequence, run serially in declared order (SPEC.md §12.5).
  # mode: autofix — pushes tool-generated, semantics-preserving commits
  #       report  — check runs + findings only (no pushes)
  #       off     — disabled
  # block_on: critical — route stub to status:blocked if critical findings
  #           any      — block on any findings; omit to never block on this janitor
  # Security tools are report-only, always: a janitor MUST NOT apply
  # autofixes offered by a security tool (SPEC.md §12.5.2).
  # init posture: every janitor ships in report mode; operators graduate
  # individual tools to autofix once trusted.
  #
  # Example fully-configured operator stack (uncomment and adjust modes):
  # janitors:
  #   - {name: format,  run: "ruff format .",               mode: autofix}
  #   - {name: imports, run: "ruff check --select I --fix", mode: autofix}
  #   - {name: lint,    run: "ruff check",                  mode: report}
  #   - {name: semgrep, run: "semgrep ci",                  mode: report, block_on: critical}
  #   - {name: secrets, run: "gitleaks detect",             mode: report, block_on: any}
  #   - {name: deps,    run: "pip-audit",                   mode: report}
  janitors:
    - name: format
      run: "<tool command>"     # e.g. "ruff format ." or "prettier --write ."
      mode: report
    - name: semgrep
      run: "semgrep --config auto"
      mode: report

  # Per-path janitor mode ratchet (optional). Glob keys override the
  # global janitor mode for files matching that path. Use to keep legacy
  # or generated directories report-only even when global mode is autofix.
  # Example:
  # paths:
  #   "legacy/**":    {janitors_mode: report}
  #   "generated/**": {janitors_mode: off}

  # Fork-specific overrides (SPEC.md §12.2.5).
  # autofix is always false on forks — the spec states this as policy, not
  # as a platform accident. Not configurable upward.
  forks:
    autofix: false

  # Report-to-work: how report findings become follow-on issues at
  # settlement (SPEC.md §12.8.4).
  # file:  auto — file an issue per category at settlement
  # start: auto — apply status:todo on the spawned issue (still passes the
  #        planned lane's approval gates); manual — file visibly, human launches.
  reports:
    lint:     {file: auto, start: auto}
    tests:    {file: auto, start: auto}
    security: {file: auto, start: manual}
    deps:     {file: auto, start: manual}

# ============================================================
# LABELS
# Organised into axes. The full label name is "{axis}:{value}".
# routes_to wires a label to an agent role in the orchestrator.
# All labels are provisioned idempotently (upsert by name).
# ============================================================
labels:

  # ---- STATUS AXIS — PRIMARY ROUTING TRIGGER ----
  - axis: status
    description: "Issue lifecycle state. Changing this label drives the agent state machine."
    values:
      - name: todo
        color: "ededed"
        description: "Ready for builder to implement"
        routes_to: builder

      - name: in-progress
        color: "0075ca"
        description: "Builder is actively working on this"
        routes_to: null           # Informational only

      - name: in-review
        color: "fbca04"
        description: "PR open, reviewer agent running"
        routes_to: reviewer

      - name: changes-requested
        color: "d93f0b"
        description: "Reviewer requested changes; builder must retry"
        routes_to: builder

      - name: approved
        color: "0e8a16"
        description: "PR approved; ready to merge or hand off to docs"
        routes_to: null           # docs role handles this if enabled

      - name: blocked
        color: "b60205"
        description: "Cannot proceed without human intervention"
        routes_to: null           # Human resolves

      - name: plan
        color: "c5def5"
        description: "Expand this issue into a plan (planner entry point)"
        routes_to: planner        # Dispatches planner on label applied

      - name: plan-review
        color: "e4e669"
        description: "Plan written into body; awaiting admin /approve-plan"
        routes_to: null           # No agent; human approval required

      - name: intake
        color: "c5b8f0"
        description: "Wild PR classified; janitors running or settling; archaeologist queued"
        routes_to: archaeologist  # Dispatched after janitors settle and tripwires pass

      - name: intake-review
        color: "e4d069"
        description: "Reconstruction written; awaiting /approve-intent"
        routes_to: null           # No agent; human approval required

      - name: done
        color: "0e8a16"
        description: "Issue resolved; terminal state"
        routes_to: null           # Terminal

  # ---- AGENT AXIS — OWNERSHIP ----
  - axis: agent
    description: "Which agent currently holds this issue. Set by agents, read by humans."
    values:
      - name: builder
        color: "1d76db"
        description: "Builder agent is the current owner"

      - name: reviewer
        color: "cc317c"
        description: "Reviewer agent is the current owner"

      - name: docs
        color: "5319e7"
        description: "Docs agent is the current owner"

      - name: watcher
        color: "0075ca"
        description: "Watcher agent is the current owner"

      - name: planner
        color: "f9d0c4"
        description: "Planner agent is the current owner"

      - name: janitor
        color: "c2e0c6"
        description: "Janitor tooling is running on the linked wild PR"

      - name: archaeologist
        color: "d4c5f9"
        description: "Archaeologist is reconstructing intent for this stub"

  # ---- TYPE AXIS — ISSUE CLASSIFICATION ----
  - axis: type
    description: "Issue classification. Used for board filtering."
    values:
      - name: feature
        color: "84b6eb"
        description: "New feature or enhancement"
        auto_add_to_board: true   # type:feature issues are added to Projects v2 board on open

      - name: bug
        color: "ee0701"
        description: "Something is broken"

      - name: chore
        color: "fef2c0"
        description: "Maintenance, dependency update, or refactor"

      - name: docs
        color: "fef2c0"
        description: "Documentation change"

      - name: question
        color: "d876e3"
        description: "A question or discussion item"

  # ---- REVIEW AXIS — VERDICT SUB-FLAGS ----
  - axis: review
    description: "Fine-grained reviewer verdicts. Used alongside status:changes-requested."
    values:
      - name: scope-violation
        color: "b60205"
        description: "PR changes more than the issue scope allows"

  # ---- SOURCE AXIS — ORIGIN PROVENANCE ----
  - axis: source
    description: "How this issue was created. Set at creation time."
    values:
      - name: agent-created
        color: "0e8a16"
        description: "Created by an agent"

      - name: human-created
        color: "bfd4f2"
        description: "Created by a human"

      - name: wild
        color: "d4c5f9"
        description: "Created by the intake classifier from an unplanned pull request"

  # ---- FOLLOW-ON AXIS — ASYNC HANDOFF SIGNALS ----
  # Routes_to is configurable. Null = informational only.
  # Set routes_to to a role id to trigger that agent when the label is applied.
  - axis: follow-on
    description: "Signal that an async follow-on action is needed."
    values:
      - name: docs-needed
        color: "fef2c0"
        description: "Documentation should be updated as a follow-on action"
        routes_to: null           # Set to "docs" to auto-trigger docs agent

      - name: needs-cleanup
        color: "fef2c0"
        description: "Report-tier lint/format/dead-code findings from intake"
        routes_to: null           # Consumed by watcher at settlement (SPEC.md §12.8)

      - name: needs-tests
        color: "fef2c0"
        description: "Characterisation-test work for code touched by a wild PR"
        routes_to: null           # Consumed by watcher at settlement (SPEC.md §12.8)

      - name: needs-security-review
        color: "b60205"
        description: "Semgrep / dependency-audit findings from intake"
        routes_to: null           # Consumed by watcher at settlement (SPEC.md §12.8)

# ============================================================
# BOARD
# Projects v2 command-center board. One board per deployment.
# Fields are provisioned idempotently via GraphQL.
# The schema_fingerprint in field-bindings.json detects drift.
# ============================================================
board:
  enabled: true
  name: "AgentOS Command Center"
  description: "Agent telemetry and task tracking board"
  visibility: private             # private | public

  fields:

    # ---- METADATA FIELDS ----
    - name: Role
      type: single_select
      flow: metadata
      description: "Which agent role owns this issue"
      label_map_axis: agent       # Synced from agent:* label value
      options:
        - name: Builder
          color: BLUE
        - name: Reviewer
          color: RED
        - name: Docs
          color: GREEN
        - name: Watcher
          color: PURPLE
        - name: Planner
          color: PINK
        - name: Janitor
          color: GREEN
        - name: Archaeologist
          color: PURPLE

    - name: Agent Status
      type: single_select
      flow: metadata
      description: "Current lifecycle status (mirrors status:* label)"
      label_map_axis: status
      options:
        - name: Todo
          color: GRAY
        - name: In progress
          color: BLUE
        - name: In review
          color: YELLOW
        - name: Changes requested
          color: ORANGE
        - name: Approved
          color: GREEN
        - name: Blocked
          color: RED
        - name: Planning
          color: BLUE
        - name: Plan
          color: BLUE
        - name: Plan review
          color: YELLOW
        - name: Intake
          color: PURPLE
        - name: Intake review
          color: YELLOW
        - name: Done
          color: PURPLE

    # ---- PARAMETER FIELDS ----
    - name: Max turns
      type: number
      flow: parameter
      description: "Maximum turns budget for this issue"
      default: 40

    - name: Model
      type: single_select
      flow: parameter
      description: "Which LLM model to use for this issue (overrides default)"
      options:
        # Display names only. Map these to actual model IDs in config.yaml.
        # NOTICE: These are 2026-06 reference models. Update as new models ship.
        - name: claude-haiku
          color: YELLOW
          display: "Claude Haiku — fast, cheap, routine tasks"
        - name: claude-sonnet
          color: GREEN
          display: "Claude Sonnet — balanced capability and cost"
        - name: gpt-4o-mini
          color: BLUE
          display: "GPT-4o Mini — fast general-purpose"
        - name: gemini-flash
          color: PURPLE
          display: "Gemini Flash — fast multimodal"
        - name: kimi-k2
          color: ORANGE
          display: "Kimi K2 — strong coding performance"

    # ---- TELEMETRY FIELDS ----
    - name: Outcome
      type: single_select
      flow: telemetry
      source: runner
      reduce: latest_settlement
      description: "Final disposition of the PR for this issue"
      options:
        - name: Provisional
          color: YELLOW
        - name: Merged
          color: GREEN
        - name: Closed unmerged
          color: GRAY
        - name: CI failed
          color: RED
        - name: Reverted
          color: RED
        - name: Abandoned
          color: GRAY

    - name: Clean exit
      type: single_select
      flow: telemetry
      source: runner
      reduce: last_run
      description: "Exit status of the most recent agent run"
      options:
        - name: Clean
          color: GREEN
        - name: Crashed
          color: RED
        - name: Max turns
          color: ORANGE
        - name: Infra failure
          color: RED

    - name: Cost to date
      type: number
      flow: telemetry
      source: runner
      reduce: sum_runs
      description: "Total USD cost of all runs for this issue"

    - name: Turns
      type: number
      flow: telemetry
      source: runner
      reduce: sum_runs
      description: "Total turns across all runs for this issue"

    - name: Attempts
      type: number
      flow: telemetry
      source: runner
      reduce: count_runs
      description: "Number of agent run attempts on this issue"

# ============================================================
# METRICS
# JSONL run-record schema. One record per agent invocation.
# One settlement record per PR close.
# ============================================================
metrics:
  enabled: true
  format: jsonl
  schema_version: 6
  output_path: "ops-metrics/"
  retention_months: 3
  events:
    - run
    - settlement
  required_fields:
    - schema_version
    - event
    - run_key
    - identity.repo
    - identity.role
    - identity.model_name
    - lifecycle.started_at
    - lifecycle.ended_at
    - cost.total_cost_usd
    - clean_exit.status

# ============================================================
# PLUGINS
# Plugins are applied after core provisioning. They may add
# labels, board fields, workflows, and agent configs.
# Plugins MUST NOT modify core-provisioned resources.
#
# Uncomment to activate. Sources:
#   github:{owner}/{repo}//{path}@{ref}   Remote
#   local:{path}                           Local relative path
# ============================================================
plugins: []
# Example — uncomment to activate the reference 3Qs plugin:
# plugins:
#   - name: three-questions
#     source: github:open-agentos/agentos//plugins/three-questions@v1.2.1
#     description: "Daily 3Qs intelligence plugin — phase labels, watcher schedule"
