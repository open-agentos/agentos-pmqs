<?xml version="1.0" encoding="UTF-8"?>
<!--
  PMQs mark: "the quill/A". Replaces the Faceted Prism Q (brand doc section 2).
  An amber tile carrying a light quill/A glyph, drawn as a triangular apex with
  a crossbar and a small apex point. THIS FILE IS THE MARK'S ONLY SOURCE.

  ============================================================================
  DESIGN AGENT: this is the file to edit. Nothing else needs to change. This
  mark is a faithful first pass adapted from the parchment mock and is meant to
  be revisited; keep it square, keep the two colours tracking their tokens.
  ============================================================================

  Variants
    logo-mark.svg      this file, the detailed mark. Carries the apex point
                       (id="apex") and finer 2.2 strokes.
    logo-fallback.svg  the simplified glyph: no apex point, heavier 2.8 strokes,
                       so it stays legible at favicon scale. Same viewBox, so
                       the two are drop-in swappable.

  Colours
    Literal hex, not var(), on purpose: this file is also served standalone as a
    favicon, where CSS custom properties have no document to resolve against.
    Two values here ARE tokens and must track docs section 3:
        #95500f = accent-gold   (the tile)
        #fdf6e9 = on-accent      (the glyph)
    tests/test_logo.py pins both. If you retune a token, that test tells you.

  Don't (section 2): stretch the tile off square; drop the glyph contrast below
  legible; pair with a second icon in the same lockup.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none">
  <rect id="tile" x="0" y="0" width="28" height="28" rx="8" fill="#95500f"/>
  <g id="glyph" stroke="#fdf6e9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 22 L14 6 l8 16"/>
    <path d="M9 17 h10"/>
  </g>
  <circle id="apex" cx="14" cy="6" r="1.5" fill="#fdf6e9"/>
</svg>
