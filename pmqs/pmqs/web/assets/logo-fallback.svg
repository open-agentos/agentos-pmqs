<?xml version="1.0" encoding="UTF-8"?>
<!--
  PMQs simplified glyph. The quill/A at favicon scale. Same viewBox as
  logo-mark.svg, so the two are drop-in swappable through the size threshold in
  web/logo.py.

  Drops the apex point (which closes up to a blob below ~20px) and thickens the
  strokes to 2.8 so the A holds its shape in a 16px tab. Colours are the same
  literal token values as the detailed mark (accent-gold tile, on-accent glyph).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none">
  <rect x="0" y="0" width="28" height="28" rx="8" fill="#95500f"/>
  <g stroke="#fdf6e9" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 22 L14 6 l8 16"/>
    <path d="M9 17 h10"/>
  </g>
</svg>
